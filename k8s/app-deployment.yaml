apiVersion: apps/v1
kind: Deployment
metadata:
  name: tglobe-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tglobe
  template:
    metadata:
      labels:
        app: tglobe
    spec:
      containers:
      - name: tglobe-app
        image: tglobe-app:v1  # Changed from latest to v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        # ... rest of your config ...